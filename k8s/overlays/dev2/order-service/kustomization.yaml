apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev2-order-service

resources:
  - ../../../base/order-service
  - namespace.yaml

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: order-service
      spec:
        template:
          spec:
            containers:
              - name: order-service
                env:
                  - name: ENV_NAME
                    value: "dev2"
    target:
      kind: Deployment
      name: order-service

