apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev4-product-service

resources:
  - ../../../base/product-service
  - namespace.yaml

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: product-service
      spec:
        template:
          spec:
            containers:
              - name: product-service
                env:
                  - name: ENV_NAME
                    value: "dev4"
    target:
      kind: Deployment
      name: product-service

