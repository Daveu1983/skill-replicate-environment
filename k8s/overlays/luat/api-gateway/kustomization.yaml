apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: luat-api-gateway

resources:
  - ../../../base/api-gateway
  - namespace.yaml

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-gateway
      spec:
        template:
          spec:
            containers:
              - name: api-gateway
                env:
                  - name: ENV_NAME
                    value: "luat"
    target:
      kind: Deployment
      name: api-gateway

